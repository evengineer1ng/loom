<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello Oradio</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid; place-items: center;
      background: radial-gradient(ellipse at top, #16203a, #07090f);
      color: #e8ecf8; font: 16px/1.5 "Segoe UI", system-ui, sans-serif;
    }
    .card { text-align: center; padding: 2rem 3rem; border-radius: 16px;
            border: 1px solid rgba(111,140,255,.25); background: rgba(20,28,50,.6); }
    h1 { margin: 0 0 .25rem; font-size: 1.6rem; }
    p { margin: 0; color: #9fb0d8; }
    .glyph { font-size: 3rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glyph">&#128075;</div>
    <h1>Hello from an HTML brick</h1>
    <p>This page is a brick. An oradio can open straight to it.</p>
  </div>
</body>
</html>
